openapi: 3.0.3
info:
  title: Nickel API
  description: "This is the specification for the Nickel Rest API. The API lets you programatically interact with the Nickel server. It uses resource oriented URLs, accepts and returns JSON encoded payloads and uses standard HTTP response codes. It is not a direct API to move money, but instead allows you to interact with Nickel as you would on a web interface."
  termsOfService: https://www.getnickel.com/terms-of-service
  contact:
    email: api-support@getnickel.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
externalDocs:
  description: Find out more about Nickel
  url: https://getnickel.com
servers:
  - url: https://rest.staging.nickel.com
    description: Sandbox / Staging
tags:
  - name: Payment
    description: Payments from your customers to you
  - name: Disbursement
    description: Payouts made from Nickel to you
  - name: Payment Link
    description: A request for payment against an invoice
  - name: Customer
    description: A customer record to request payments against
  - name: Attachment
    description: Attachments on a payment link
  - name: Charge Authorization
    description: An authorization for your customer to allow you to charge their payment method directly
  - name: Webhook
    description: Create a webhook for nickel to send updates to
  - name: File
    description: A file you can use to attach to invoices or debit authorizations
  - name: Vendor
    description: Manage vendors for accounts payable
  - name: Bill
    description: Bills from vendors and bill payments
  - name: Vendor Payout
    description: Settlements to vendors
  - name: Vendor Payout Method
    description: Vendor bank account and delivery method management
security:
  - bearerAuth: []
paths:
  /file:
    post:
      tags:
        - File
      summary: Upload a file
      operationId: uploadFile
      requestBody:
        description: File Upload
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/file_body"
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/File"
  /webhook:
    get:
      tags:
        - Webhook
      summary: Get webhooks
      operationId: getWebhooks
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200"
        "400":
          description: Invalid ID supplied
        "404":
          description: Payment link not found
        "422":
          description: Validation exception
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - Webhook
      summary: Create a webhook
      operationId: createWebhook
      requestBody:
        description: Create a webhook
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookCreateRequest"
        required: true
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "400":
          description: Invalid ID supplied
        "404":
          description: Payment link not found
        "422":
          description: Validation exception
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /paymentLink:
    post:
      tags:
        - Payment Link
      summary: Create a new payment link
      operationId: addPaymentLink
      requestBody:
        description: Create a new payment link
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentLinkCreateRequest"
        required: true
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentLink"
        "400":
          description: Invalid input
        "422":
          description: Validation exception
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /paymentLink/{paymentLinkId}:
    get:
      tags:
        - Payment Link
      summary: Find a payment link by id
      operationId: getPaymentLinkById
      parameters:
        - name: paymentLinkId
          in: path
          description: ID of paymentLink to return
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentLink"
        "400":
          description: Invalid ID supplied
        "404":
          description: PaymentLink not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags:
        - Payment Link
      summary: Update an existing payment link.
      operationId: updatePaymentLink
      parameters:
        - name: paymentLinkId
          in: path
          description: ID of paymentLink to return
          required: true
          schema:
            type: string
      requestBody:
        description: Update an existing payment link.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentLinkUpdateRequest"
        required: true
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentLink"
        "400":
          description: Invalid ID supplied
        "404":
          description: Payment link not found
        "422":
          description: Validation exception
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags:
        - Payment Link
      summary: Deletes a payment link.
      operationId: deletePaymentLink
      parameters:
        - name: paymentLinkId
          in: path
          description: Payment link id to delete
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Paymentlink deleted
        "400":
          description: Invalid payment link value
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /paymentLink/{paymentLinkId}/uploadPdf:
    post:
      tags:
        - Payment Link
      summary: Uploads a pdf to a payment link.
      operationId: uploadFileToPaymentLink
      parameters:
        - name: paymentLinkId
          in: path
          description: ID of payment link to update
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/paymentLinkId_uploadPdf_body"
        required: true
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          description: No file uploaded
        "404":
          description: Payment link not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /paymentLink/customer/{customerId}:
    get:
      tags:
        - Payment Link
      summary: Return payment links by customerId
      operationId: getPaymentLinksByCustomerId
      parameters:
        - name: customerId
          in: path
          description: ID of the customer
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_1"
  /attachment/{attachmentId}:
    delete:
      tags:
        - Attachment
      summary: Deletes an attachment on a payment link.
      operationId: deleteAttachment
      parameters:
        - name: attachmentId
          in: path
          description: Attachment to delete
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Attachment deleted
        "400":
          description: Invalid payment link value
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /payment/{paymentId}:
    get:
      tags:
        - Payment
      summary: Returns a payment by id
      operationId: getPayment
      parameters:
        - name: paymentId
          in: path
          description: ID of the payment
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /payment/{paymentId}/refund:
    post:
      tags:
        - Payment
      summary: Refund a payment
      description: Refunds a payment fully or partially. Credit card payments that have not yet settled can be voided. ACH payments can be refunded as a credit back to the payer.
      operationId: refundPayment
      parameters:
        - name: paymentId
          in: path
          description: ID of the payment to refund
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefundPaymentRequest"
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /disbursement/{disbursementId}:
    get:
      tags:
        - Disbursement
      summary: Returns a disbursement by id
      operationId: getDisbursement
      parameters:
        - name: disbursementId
          in: path
          description: ID of the disbursement
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Disbursement"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /customer:
    put:
      tags:
        - Customer
      summary: Update a customer
      operationId: updateCustomer
      requestBody:
        description: Update an existing customer
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerCreateRequest"
        required: true
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          description: Invalid ID supplied
        "404":
          description: Payment link not found
        "422":
          description: Validation exception
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - Customer
      summary: Create a customer
      operationId: addCustomer
      requestBody:
        description: Create a new customer
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Customer"
        required: true
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentLink"
        "400":
          description: Invalid input
        "422":
          description: Validation exception
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /customer/{customerId}:
    get:
      tags:
        - Customer
      summary: Find a customer by id
      operationId: getCustomerById
      parameters:
        - name: customerId
          in: path
          description: ID of the customer that needs to be fetched
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          description: Invalid input
        "422":
          description: Validation exception
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /customer/findByEmail:
    get:
      tags:
        - Customer
      summary: Find a customer by email
      operationId: getCustomerByEmail
      parameters:
        - name: email
          in: query
          description: Email that will be used to query the customer
          required: false
          explode: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          description: Invalid input
        "422":
          description: Validation exception
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /customer/{customerId}/uploadACHDebitAuthorizationPdf:
    post:
      tags:
        - Customer
      summary: Upload an ACH Debit Authorization PDF
      operationId: Upload ACH Debit Authorization PDF
      parameters:
        - name: customerId
          in: path
          description: ID of the customer that needs to be fetched
          required: true
          schema:
            type: string
      requestBody:
        description: Create a new customer
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DebitAuthorizationUploadPDFRequest"
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChargeAuthorization"
        "400":
          description: Invalid input
        "422":
          description: Validation exception
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /customer/{customerId}/requestChargeAuthorization:
    post:
      tags:
        - Customer
      summary: Request  charge authorization from a customer
      operationId: requestchargeAuthorizationFromCustomer
      parameters:
        - name: customerId
          in: path
          description: ID of the customer that needs to be fetched
          required: true
          schema:
            type: string
      requestBody:
        description: Create a new customer
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChargeAuthorizationCreateRequest"
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChargeAuthorization"
        "400":
          description: Invalid input
        "422":
          description: Validation exception
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /chargeAuthorization/{chargeAuthorizationId}:
    get:
      tags:
        - Charge Authorization
      summary: Returns a charge authorization by id
      operationId: getChargeAuthorization
      parameters:
        - name: chargeAuthorizationId
          in: path
          description: Charge authorization id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChargeAuthorization"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /chargeAuthorization/pay:
    post:
      tags:
        - Charge Authorization
      summary: Make payments using charge authorizations
      description: Process payments for one or more payment links across multiple charge authorizations in a single request.
      operationId: payWithChargeAuthorization
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/chargeAuthorization_pay_body"
        required: true
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_2"
        "400":
          description: Invalid input
        "422":
          description: Validation exception
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /vendor:
    get:
      tags:
        - Vendor
      summary: List vendors
      operationId: listVendors
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
        - name: pageSize
          in: query
          description: Number of results per page
          required: false
          schema:
            type: integer
        - name: vendorName
          in: query
          description: Filter vendors by name
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorListResponse"
        "400":
          description: Invalid input
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - Vendor
      summary: Create a vendor
      operationId: createVendor
      requestBody:
        description: Create a new vendor
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorCreateRequest"
        required: true
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        "400":
          description: Invalid input
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /vendor/{vendorId}:
    get:
      tags:
        - Vendor
      summary: Get a vendor by ID
      operationId: getVendor
      parameters:
        - name: vendorId
          in: path
          description: ID of the vendor
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        "404":
          description: Vendor not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags:
        - Vendor
      summary: Update a vendor
      operationId: updateVendor
      parameters:
        - name: vendorId
          in: path
          description: ID of the vendor to update
          required: true
          schema:
            type: string
      requestBody:
        description: Update an existing vendor
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorUpdateRequest"
        required: true
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        "400":
          description: Invalid input
        "404":
          description: Vendor not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags:
        - Vendor
      summary: Delete a vendor
      operationId: deleteVendor
      parameters:
        - name: vendorId
          in: path
          description: ID of the vendor to delete
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Vendor deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid input
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /vendor/{vendorId}/payoutMethod/ach:
    put:
      tags:
        - Vendor Payout Method
      summary: Update vendor ACH payout method
      operationId: updateVendorACHPayoutMethod
      parameters:
        - name: vendorId
          in: path
          description: ID of the vendor
          required: true
          schema:
            type: string
      requestBody:
        description: ACH payout method details
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorACHUpdateRequest"
        required: true
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorIdResponse"
        "400":
          description: Invalid input
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /vendor/{vendorId}/payoutMethod/check:
    put:
      tags:
        - Vendor Payout Method
      summary: Update vendor check payout method
      operationId: updateVendorCheckPayoutMethod
      parameters:
        - name: vendorId
          in: path
          description: ID of the vendor
          required: true
          schema:
            type: string
      requestBody:
        description: Check payout method details
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorCheckUpdateRequest"
        required: true
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorIdResponse"
        "400":
          description: Invalid input
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /vendor/{vendorId}/payoutMethod/wire:
    put:
      tags:
        - Vendor Payout Method
      summary: Update vendor wire payout method
      operationId: updateVendorWirePayoutMethod
      parameters:
        - name: vendorId
          in: path
          description: ID of the vendor
          required: true
          schema:
            type: string
      requestBody:
        description: Wire payout method details
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorWireUpdateRequest"
        required: true
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorIdResponse"
        "400":
          description: Invalid input
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /vendorPayoutMethod/{vendorPayoutMethodId}:
    delete:
      tags:
        - Vendor Payout Method
      summary: Delete a vendor payout method
      operationId: deleteVendorPayoutMethod
      parameters:
        - name: vendorPayoutMethodId
          in: path
          description: ID of the vendor payout method to delete
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Vendor payout method deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid input
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /vendor/{vendorId}/requestDeliveryDetails:
    post:
      tags:
        - Vendor Payout Method
      summary: Request delivery details from a vendor
      operationId: requestDeliveryDetails
      parameters:
        - name: vendorId
          in: path
          description: ID of the vendor
          required: true
          schema:
            type: string
      requestBody:
        description: Optional email addresses to send the request to
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestDeliveryDetailsRequest"
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryDetailsResponse"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /bill:
    get:
      tags:
        - Bill
      summary: List bills
      operationId: listBills
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
        - name: pageSize
          in: query
          description: Number of results per page
          required: false
          schema:
            type: integer
        - name: vendorName
          in: query
          description: Filter bills by vendor name
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillListResponse"
        "400":
          description: Invalid input
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - Bill
      summary: Create a bill
      operationId: createBill
      requestBody:
        description: Create a new bill
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillCreateRequest"
        required: true
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"
        "400":
          description: Invalid input
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /bill/{billId}:
    get:
      tags:
        - Bill
      summary: Get a bill by ID
      operationId: getBill
      parameters:
        - name: billId
          in: path
          description: ID of the bill
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"
        "404":
          description: Bill not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags:
        - Bill
      summary: Update a bill
      operationId: updateBill
      parameters:
        - name: billId
          in: path
          description: ID of the bill to update
          required: true
          schema:
            type: string
      requestBody:
        description: Update an existing bill
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillUpdateRequest"
        required: true
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"
        "400":
          description: Invalid input
        "404":
          description: Bill not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags:
        - Bill
      summary: Delete a bill
      operationId: deleteBill
      parameters:
        - name: billId
          in: path
          description: ID of the bill to delete
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Bill deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid input
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /bill/pay:
    post:
      tags:
        - Bill
      summary: Pay bills
      description: Process payments for one or more bills in a single batch request.
      operationId: payBill
      requestBody:
        description: Batch bill payment request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillPaymentCreateRequest"
        required: true
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillPaymentCreateResponse"
        "400":
          description: Invalid input
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /billPayment/{billPaymentId}:
    get:
      tags:
        - Bill
      summary: Get a bill payment by ID
      operationId: getBillPayment
      parameters:
        - name: billPaymentId
          in: path
          description: ID of the bill payment
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillPayment"
        "404":
          description: Bill payment not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /billPayment/{billPaymentId}/cancel:
    post:
      tags:
        - Bill
      summary: Cancel a bill payment
      operationId: cancelBillPayment
      parameters:
        - name: billPaymentId
          in: path
          description: ID of the bill payment to cancel
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillPayment"
        "404":
          description: Bill payment not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Attachment:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
    Fee:
      type: object
      properties:
        feeType:
          type: string
          example: Credit Card Fee
        amountCents:
          type: integer
          format: int64
          example: 290
    Refund:
      type: object
      properties:
        id:
          type: string
        amountCents:
          type: integer
          format: int64
          example: 515
        refundDate:
          type: string
          format: date
        void:
          type: boolean
    Disbursement:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          example: PENDING
        amountInCents:
          type: integer
          format: int64
          example: 10000
        bankName:
          type: string
          example: JP Morgan Chase
        accountNumberLastFour:
          type: string
        paymentIds:
          type: array
          items:
            type: string
            example: clkqzo2y1000cx9tfohoiodq1
    Payment:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          example: SUCCEEDED
        fees:
          type: array
          items:
            $ref: "#/components/schemas/Fee"
        amountInCents:
          type: integer
          format: int64
          example: 10000
        chargedAmountInCents:
          type: integer
          format: int64
          example: 10290
        platformFeeInCents:
          type: integer
          format: int64
          example: 290
        paymentLinkId:
          type: string
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
        disbursement:
          $ref: "#/components/schemas/Disbursement"
        refunds:
          type: array
          items:
            $ref: "#/components/schemas/Refund"
    ACHDetails:
      type: object
      properties:
        bankName:
          type: string
          example: JP Morgan Chase
        routingNumber:
          type: string
        accountNumberLastFour:
          type: string
    CardDetails:
      type: object
      properties:
        brand:
          type: string
          example: visa
        last4:
          type: string
        holderName:
          type: string
        expMonth:
          type: string
          example: "2"
        expYear:
          type: string
          example: "2030"
    BillingDetails:
      type: object
      properties:
        name:
          type: string
        companyName:
          type: string
        street:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        countryCode:
          type: string
    PaymentMethod:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - ACH
            - Card
        achDetails:
          $ref: "#/components/schemas/ACHDetails"
        cardDetails:
          $ref: "#/components/schemas/CardDetails"
        billingDetails:
          $ref: "#/components/schemas/BillingDetails"
    DebitAuthorizationUploadPDFRequest:
      required:
        - accountNumber
        - accountType
        - fileId
        - routingNumber
      type: object
      properties:
        routingNumber:
          type: string
        accountNumber:
          type: string
        accountType:
          type: string
          enum:
            - checking
            - savings
        fileId:
          type: string
        memo:
          type: string
        transactionLimitCents:
          type: integer
          format: int64
        expirationDate:
          type: string
          format: date
    ChargeAuthorizationCreateRequest:
      type: object
      properties:
        emails:
          type: array
          items:
            type: string
        memo:
          type: string
        sendEmail:
          type: boolean
        transactionLimitCents:
          type: integer
          format: int64
        expirationDate:
          type: string
          format: date
    ChargeAuthorization:
      type: object
      properties:
        id:
          type: string
        customerId:
          type: string
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
        transactionLimitCents:
          type: integer
          format: int64
        expirationDate:
          type: string
          format: date
        active:
          type: boolean
    ChargeAuthorizationPaymentInput:
      required:
        - paymentLinkId
      type: object
      properties:
        paymentLinkId:
          type: string
          description: ID of the payment link to pay
        withdrawalDate:
          type: string
          description: "Schedule the payment for a future date (YYYY-MM-DD). If omitted, the payment is processed immediately. Date must be today or later."
          format: date
        amountCents:
          type: integer
          description: "Amount to charge in cents. If omitted, charges the remaining balance on the invoice."
    ChargeAuthorizationPayment:
      required:
        - chargeAuthorizationId
        - paymentLinks
      type: object
      properties:
        chargeAuthorizationId:
          type: string
          description: ID of the charge authorization to use for payment
        paymentLinks:
          type: array
          items:
            $ref: "#/components/schemas/ChargeAuthorizationPaymentInput"
    ChargeAuthorizationPaymentResult:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        url:
          type: string
        dueDate:
          type: string
          nullable: true
        customerId:
          type: string
        requestedAmountCents:
          type: integer
        completedAmountCents:
          type: integer
        paymentId:
          type: string
          description: ID of the payment created for this invoice
          nullable: true
    ChargeAuthorizationPaymentError:
      type: object
      properties:
        paymentLinkId:
          type: string
        paymentLinkName:
          type: string
          nullable: true
        error:
          type: string
    CustomerCreateRequest:
      type: object
      required:
        - name
        - emails
      properties:
        name:
          type: string
        emails:
          type: aray
          items:
            type: string
            format: email
    Customer:
      required:
        - email
        - name
      type: object
      properties:
        id:
          type: string
          example: clkqzo2y1000cx9tfohoiodq1
        name:
          type: string
          example: Claudio Wilson
        chargeAuthorizations:
          type: array
          items:
            $ref: "#/components/schemas/ChargeAuthorization"
        email:
          type: string
          format: email
