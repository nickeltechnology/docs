          type: integer
          format: int64
          example: 12055
        name:
          type: string
          example: INV-123
        dueDate:
          type: string
          format: date
        customerId:
          type: string
    Webhook:
      required:
        - id
        - url
      type: object
      properties:
        url:
          type: string
        id:
          type: string
    WebhookCreateRequest:
      required:
        - url
      type: object
      properties:
        url:
          type: string
    PaymentLinkUpdateRequest:
      properties:
        requestedAmountCents:
          type: integer
          format: int64
          example: 12055
        name:
          type: string
          example: INV-123
        dueDate:
          type: string
          format: date
    File:
      required:
        - createdAt
        - id
        - key
        - type
      type: object
      properties:
        id:
          type: string
        key:
          type: string
        type:
          type: string
          enum:
            - ACH_DEBIT_AUTHORIZATION_PDF
            - INVOICE_PDF
        createdAt:
          type: string
          format: date-time
    PaymentLink:
      required:
        - customerId
        - name
      type: object
      properties:
        id:
          type: string
          example: clkqzo2y1000cx9tfohoiodq1
        requestedAmountCents:
          type: integer
          format: int64
          example: 12055
        name:
          type: string
          example: INV-123
        dueDate:
          type: string
          format: date
        status:
          type: string
          example: ACTIVE
        payments:
          type: array
          items:
            $ref: "#/components/schemas/Payment"
        customerId:
          type: string
        url:
          type: string
          format: uri
          example: https://nickel.nickelpayments.com/pay/Ahndhz
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/Attachment"
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
        type:
          type: string
        message:
          type: string
